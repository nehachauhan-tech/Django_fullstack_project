{% extends "layout.html" %}
{% block title %}
Chai aur Django - Delete Tweet
{% endblock %}

{% block content %}
    <h1 class="text-center text-white mt-4">Delete Tweet</h1>

    <div class="text-white mt-3">
        <!-- Confirm before deleting -->
        <p>Are you sure you want to delete this tweet by <strong>{{ tweet.user.username }}</strong>?</p>
        <p class="text-muted">{{ tweet.text }}</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <!-- Red delete/back button instead of cancel -->
                    <a href="{% url 'tweet_list' %}" class="btn btn-danger">Delete</a>
        </form>
    </div>
{% endblock %}
