{% extends "layout.html" %}
{% block title %}
Chai aur Django - Login
{% endblock %}

{% block content %}
<div class="row justify-content-start mt-5">
    <div class="col-md-8 text-white">
        <h2 class="mb-4 fw-normal">Login form</h2>
        
        <form method="post" class="mt-2">
            {% csrf_token %}
            
            <div class="login-form-container">
                {% for field in form %}
                <div class="d-flex align-items-center mb-3">
                    <label for="{{ field.id_for_label }}" class="me-2" style="min-width: 100px;">{{ field.label }}:</label>
                    <div style="flex-grow: 1; max-width: 300px;">
                        {{ field }}
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary px-4 fw-bold">Login</button>
            </div>
        </form>
        
        <div class="mt-3">
            <p class="text-muted">Dont have an account? <a href="{% url 'register' %}" class="text-primary text-decoration-none">Register here</a></p>
        </div>
    </div>
</div>

<style>
    .login-form-container input {
        background-color: #222;
        border: 1px solid #444;
        color: #fff;
        padding: 5px 10px;
        width: 100%;
        border-radius: 4px;
    }
    .login-form-container input:focus {
        outline: none;
        border-color: #0d6efd;
        box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.25);
    }
    .text-white label {
        font-weight: normal;
    }
</style>
{% endblock %}
