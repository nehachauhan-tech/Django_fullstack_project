{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>
        {% block title %}Chai aur Django{% endblock %}
    </title>
    <style>
        /* Increase base font size for all elements */
        body { font-size: 1.1rem; }
        .card-title { font-size: 1.3rem; font-weight: bold; }
        .card-text { font-size: 1.1rem; }
        .btn { font-size: 1rem; padding: 0.5rem 1.2rem; }
        h1 { font-size: 2.2rem; }
        /* Increase navbar link sizes */
        .navbar .nav-link { font-size: 1.3rem; padding: 0.5rem 1.2rem; }
        .navbar-brand { font-size: 1.8rem; }
        /* Dark search input */
        .navbar input.form-control {
            background-color: #000;
            color: #fff;
            border-color: #555;
            font-size: 1rem;
        }
        .navbar input.form-control::placeholder { color: #aaa; }
    </style>
</head>
<body class="bg-dark">
    <!-- Black navbar with white text -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black py-4">
        <div class="container-fluid px-4">
            <!-- Brand name from the image -->
            <a class="navbar-brand fw-bold me-4" href="/">Tweetbar</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <!-- Navigation links from the image -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{% url 'tweet_list' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="#">Link</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-secondary" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Dropdown
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled text-secondary" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
                
                <!-- Search bar and action buttons -->
                <div class="d-flex align-items-center">
                    <!-- Search Form -->
                    <form class="d-flex me-2" role="search">
                        <input class="form-control me-2 bg-dark text-white border-secondary fs-5" type="search" placeholder="Search" aria-label="Search" style="width: 250px;">
                        <button class="btn btn-outline-success fw-semibold fs-5 px-3" type="submit">Search</button>
                    </form>
                    
                    <!-- Navigation & Auth Actions -->
                    <div class="d-flex align-items-center">
                        <a href="{% url 'tweet_list' %}" class="btn btn-primary me-2 fw-semibold fs-5 px-3">Tweet Home</a>
                        
                        {% if user.is_authenticated %}
                            <form action="{% url 'logout' %}" method="post" class="m-0">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-danger fw-semibold fs-5 px-3">Logout</button>
                            </form>
                        {% else %}
                            <a href="{% url 'register' %}" class="btn btn-primary me-2 fw-semibold fs-5 px-3">Register</a>
                            <a href="{% url 'login' %}" class="btn btn-success fw-semibold fs-5 px-3">Login</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
    <!-- Bootstrap JS for navbar toggle and dropdown -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
